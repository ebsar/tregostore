<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TREGO | Kerko produkte</title>
  <script src="/app.js" defer></script>
</head>
<body data-page="search">
  <div class="background-orb orb-left"></div>
  <div class="background-orb orb-right"></div>

  <div class="page-shell">
    <nav class="site-nav" aria-label="Navigimi kryesor">
      <a class="brand" href="/">
        <span class="brand-copy">
          <strong>TREGO</strong>
          <span>Farm and home</span>
        </span>
      </a>

      <div class="nav-links">
        <a class="nav-link" href="/#bujqesi">Bujqesi</a>
        <a class="nav-link" href="/#barnat">Barnat</a>
        <a class="nav-link nav-link-pets" href="/kafshet-shtepiake">Kafshet shtepiake</a>
        <a class="nav-link" href="/#shtepia">Gjerat per shtepi</a>
      </div>

      <div class="nav-actions">
        <a class="nav-icon-button wishlist-link" href="/wishlist" aria-label="Wishlist">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20.4 4.9 13.8a4.8 4.8 0 0 1 6.8-6.8l.3.3.3-.3a4.8 4.8 0 1 1 6.8 6.8Z"></path>
          </svg>
        </a>
        <a class="nav-icon-button cart-button" href="/cart" aria-label="My Cart">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 5h2l2.1 9.1a1 1 0 0 0 1 .8h8.8a1 1 0 0 0 1-.8L20 8H7.2"></path>
            <circle cx="10" cy="19" r="1.4"></circle>
            <circle cx="18" cy="19" r="1.4"></circle>
          </svg>
        </a>
        <a class="nav-action nav-action-secondary nav-link-login" href="/login">Login</a>
        <a class="nav-action nav-action-primary nav-link-signup" href="/signup">Sign Up</a>
      </div>
    </nav>

    <main class="page-main page-main-collection">
      <section class="collection-page search-page" aria-label="Kerko produkte">
        <header class="collection-page-header">
          <p class="section-label">Kerko</p>
          <h1>Kerko produktet</h1>
          <p>
            Shkruaj p.sh. `shampon` dhe do te dalin te gjitha produktet qe perputhen me kerkimin tend.
          </p>
        </header>

        <form id="search-form" class="search-form" role="search">
          <input id="search-input" class="search-input" name="q" type="search" placeholder="Kerko p.sh. shampon" autocomplete="off">
          <button id="search-submit-button" class="search-submit-button" type="submit">Kerko</button>
        </form>

        <section class="search-filters-panel" aria-label="Filtro produktet">
          <div class="search-filters-grid">
            <label class="field">
              <span>Madhesia</span>
              <select id="search-size-filter" class="search-filter-select">
                <option value="">Te gjitha madhesite</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
              </select>
            </label>

            <label class="field">
              <span>Ngjyra</span>
              <select id="search-color-filter" class="search-filter-select">
                <option value="">Te gjitha ngjyrat</option>
                <option value="bardhe">Bardhe</option>
                <option value="zeze">Zeze</option>
                <option value="gri">Gri</option>
                <option value="beige">Beige</option>
                <option value="kafe">Kafe</option>
                <option value="kuqe">Kuqe</option>
                <option value="roze">Roze</option>
                <option value="vjollce">Vjollce</option>
                <option value="blu">Blu</option>
                <option value="gjelber">Gjelber</option>
                <option value="verdhe">Verdhe</option>
                <option value="portokalli">Portokalli</option>
                <option value="shume-ngjyra">Shume ngjyra</option>
              </select>
            </label>

            <label class="field">
              <span>Cmimi</span>
              <select id="search-sort-filter" class="search-filter-select">
                <option value="">Renditja standarde</option>
                <option value="price-asc">Nga me i uleti</option>
                <option value="price-desc">Nga me i larti</option>
              </select>
            </label>
          </div>

          <div class="search-filter-actions">
            <button id="search-reset-button" class="search-reset-button" type="button">Pastro filtrat</button>
          </div>
        </section>

        <p id="search-results-label" class="search-results-label"></p>
        <div id="search-page-message" class="form-message" role="status" aria-live="polite"></div>
        <section id="search-results-grid" class="pet-products-grid" aria-label="Rezultatet e kerkimit"></section>
      </section>
    </main>
  </div>
</body>
</html>
