<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TREGO | Ndryshimi i fjalekalimit</title>
  <script src="/app.js" defer></script>
</head>
<body data-page="change-password">
  <div class="background-orb orb-left"></div>
  <div class="background-orb orb-right"></div>

  <div class="page-shell">
    <nav class="site-nav" aria-label="Navigimi kryesor">
      <a class="brand" href="/">
        <span class="brand-copy">
          <strong>TREGO</strong>
          <span>Farm and home</span>
        </span>
      </a>

      <div class="nav-links">
        <a class="nav-link" href="/#bujqesi">Bujqesi</a>
        <a class="nav-link" href="/#barnat">Barnat</a>
        <a class="nav-link nav-link-pets" href="/kafshet-shtepiake">Kafshet shtepiake</a>
        <a class="nav-link" href="/#shtepia">Gjerat per shtepi</a>
      </div>

      <div class="nav-actions">
        <a class="nav-icon-button wishlist-link" href="/wishlist" aria-label="Wishlist">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20.4 4.9 13.8a4.8 4.8 0 0 1 6.8-6.8l.3.3.3-.3a4.8 4.8 0 1 1 6.8 6.8Z"></path>
          </svg>
        </a>
        <a class="nav-icon-button cart-button" href="/cart" aria-label="My Cart">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 5h2l2.1 9.1a1 1 0 0 0 1 .8h8.8a1 1 0 0 0 1-.8L20 8H7.2"></path>
            <circle cx="10" cy="19" r="1.4"></circle>
            <circle cx="18" cy="19" r="1.4"></circle>
          </svg>
        </a>
        <a class="nav-action nav-action-secondary nav-link-login" href="/login">Login</a>
        <a class="nav-action nav-action-primary nav-link-signup" href="/signup">Sign Up</a>
      </div>
    </nav>

    <main class="page-main page-main-account">
      <section class="account-page change-password-page" aria-label="Ndryshimi i fjalekalimit">
        <section class="card account-section change-password-card">
          <p id="change-password-label" class="section-label">Siguria</p>
          <h3 id="change-password-title">Ndrysho fjalekalimin</h3>
          <p id="change-password-lead" class="section-text">
            Shkruaje fjalekalimin aktual dhe vendos nje te ri. Pas ruajtjes do te duhet te kyçesh perseri.
          </p>

          <form id="change-password-form" class="auth-form">
            <label id="change-password-email-field" class="field" hidden>
              <span>Email</span>
              <input
                id="change-password-email"
                name="email"
                type="email"
                placeholder="p.sh. emri@email.com"
                autocomplete="email"
              >
            </label>

            <label id="change-password-code-field" class="field" hidden>
              <span>Kodi i ndryshimit</span>
              <input
                id="change-password-code"
                name="code"
                type="text"
                inputmode="numeric"
                maxlength="6"
                placeholder="p.sh. 123456"
              >
            </label>

            <label id="change-password-current-field" class="field" hidden>
              <span>Fjalekalimi aktual</span>
              <input
                id="change-password-current"
                name="currentPassword"
                type="password"
                placeholder="Shkruaje fjalekalimin aktual"
                required
              >
            </label>

            <label class="field">
              <span>Fjalekalimi i ri</span>
              <input
                name="newPassword"
                type="password"
                placeholder="Shkruaje fjalekalimin e ri"
                autocomplete="new-password"
                required
              >
            </label>

            <label class="field">
              <span>Konfirmo fjalekalimin e ri</span>
              <input
                name="confirmPassword"
                type="password"
                placeholder="Perserite fjalekalimin e ri"
                autocomplete="new-password"
                required
              >
            </label>

            <div class="auth-form-actions">
              <button id="change-password-submit" type="submit">Ruaje fjalekalimin e ri</button>
              <button
                id="change-password-resend-button"
                class="button-secondary"
                type="button"
                hidden
              >
                Dergoje kodin perseri
              </button>
            </div>
          </form>

          <div id="change-password-message" class="form-message" role="status" aria-live="polite"></div>

          <p class="form-footer">
            E keni harruar fjalekalimin?
            <a class="inline-link" href="/forgot-password">Shko te dergimi i kodit</a>
          </p>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
