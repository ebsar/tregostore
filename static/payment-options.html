<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TREGO | Menyra e pageses</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body data-page="payment-options">
  <div class="background-orb orb-left"></div>
  <div class="background-orb orb-right"></div>

  <div class="page-shell">
    <nav class="site-nav" aria-label="Navigimi kryesor">
      <a class="brand" href="/">
        <span class="brand-copy">
          <strong>TREGO</strong>
          <span>Farm and home</span>
        </span>
      </a>

      <div class="nav-links">
        <a class="nav-link" href="/#bujqesi">Bujqesi</a>
        <a class="nav-link" href="/#barnat">Barnat</a>
        <a class="nav-link nav-link-pets" href="/kafshet-shtepiake">Kafshet shtepiake</a>
        <a class="nav-link" href="/#shtepia">Gjerat per shtepi</a>
      </div>

      <div class="nav-actions">
        <a class="nav-icon-button wishlist-link" href="/wishlist" aria-label="Wishlist">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20.4 4.9 13.8a4.8 4.8 0 0 1 6.8-6.8l.3.3.3-.3a4.8 4.8 0 1 1 6.8 6.8Z"></path>
          </svg>
        </a>
        <a class="nav-icon-button cart-button" href="/cart" aria-label="My Cart">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 5h2l2.1 9.1a1 1 0 0 0 1 .8h8.8a1 1 0 0 0 1-.8L20 8H7.2"></path>
            <circle cx="10" cy="19" r="1.4"></circle>
            <circle cx="18" cy="19" r="1.4"></circle>
          </svg>
        </a>
        <a class="nav-action nav-action-secondary nav-link-login" href="/login">Login</a>
        <a class="nav-action nav-action-primary nav-link-signup" href="/signup">Sign Up</a>
      </div>
    </nav>

    <main class="page-main page-main-account">
      <section class="account-page payment-options-page" aria-label="Menyra e pageses">
        <header class="account-header profile-page-header">
          <div>
            <p class="section-label">Pagesa</p>
            <h1>Zgjedhe menyren e pageses</h1>
            <p class="section-text">
              Zgjedhe nese deshiron te paguash me cash ose me kartel online.
            </p>
          </div>
        </header>

        <section class="card payment-options-card">
          <div id="payment-options-message" class="form-message" role="status" aria-live="polite"></div>

          <div class="payment-option-grid">
            <button
              id="payment-method-cash"
              class="payment-option-button"
              type="button"
              data-payment-method="cash"
              aria-pressed="false"
            >
              <span class="checkout-choice-label">Opsioni 01</span>
              <strong class="checkout-choice-title">Pages cash</strong>
              <span class="payment-option-copy">Paguani kur porosia te arrije te ju.</span>
            </button>

            <button
              id="payment-method-card"
              class="payment-option-button"
              type="button"
              data-payment-method="card-online"
              aria-pressed="false"
            >
              <span class="checkout-choice-label">Opsioni 02</span>
              <strong class="checkout-choice-title">Pages me kartel online</strong>
              <span class="payment-option-copy">Perfundoni pagesen me kartelen tuaj online.</span>
            </button>
          </div>

          <div class="profile-form-actions">
            <button id="payment-options-submit" class="profile-save-button" type="button">
              Konfirmo menyren e pageses
            </button>
            <button id="payment-options-cancel" class="ghost-button profile-cancel-button" type="button">
              Kthehu te adresa
            </button>
          </div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
